name: Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'

permissions:
  contents: read

jobs:
  verify:
    name: Verify release commit
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci

      - name: Run full verification
        run: make verify

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci

      - name: Build release archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p release
          ./scripts/build-release.sh "$GOOS" "$GOARCH" release
          binary="sheetbase-${GOOS}-${GOARCH}"
          tar -czf "release/${binary}.tar.gz" -C release "$binary"
          (cd release && sha256sum "${binary}.tar.gz" > "${binary}.tar.gz.sha256")
          (cd release && sha256sum --check --status "${binary}.tar.gz.sha256")
          mkdir -p release-check
          tar -xzf "release/${binary}.tar.gz" -C release-check
          test -x "release-check/${binary}"

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: release/*.tar.gz*
          if-no-files-found: error

  installer-smoke:
    name: Installer smoke (${{ matrix.runner }})
    needs: build
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Download release archives
        uses: actions/download-artifact@v5
        with:
          pattern: release-*
          path: release
          merge-multiple: true

      - name: Add installer asset
        run: cp scripts/install.sh release/install.sh

      - name: Run installer smoke test
        run: ./scripts/test-installer.sh

  publish:
    name: Publish GitHub release
    needs:
      - build
      - installer-smoke
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Download release archives
        uses: actions/download-artifact@v5
        with:
          pattern: release-*
          path: release
          merge-multiple: true

      - name: Add installer asset
        run: cp scripts/install.sh release/install.sh

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            release/*.tar.gz \
            release/*.tar.gz.sha256 \
            release/install.sh \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --generate-notes

  published-installer-smoke:
    name: Published installer smoke (${{ matrix.runner }})
    needs: publish
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Install from the published release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          install_dir="$RUNNER_TEMP/sheetbase-bin"
          installer_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/install.sh"
          curl --fail --silent --show-error --location --retry 3 "$installer_url" \
            | SHEETBASE_VERSION="$GITHUB_REF_NAME" SHEETBASE_INSTALL_DIR="$install_dir" sh
          "$install_dir/sheetbase" help >/dev/null
